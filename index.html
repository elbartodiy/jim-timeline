  {y:"Today · 2026", tr:"i", tier:1, j:[], star:{en:"The Offer",ru:"The Offer"},
    t:{en:"The offer on the table",ru:"Предложение на столе"},
    d:{en:"Jim is reportedly offered an IPO — billions for him, but 5,000 employees' fates handed to shareholders. (Whether the offer is real is NOT confirmed.) Full treatment inside.",ru:"Джиму, по имеющимся данным, предлагают IPO — миллиарды ему, но судьбы 5000 сотрудников в руках акционеров. (Реальность предложения НЕ подтверждена.) Полная трактовка — внутри."},
    th:{en:"Not a business decision — a test of whether fifty years of empathy can survive contact with a number.",ru:"Не бизнес-решение — проверка того, выдержат ли пятьдесят лет эмпатии контакт с цифрой."},
    full:{en:"<b>What this is — and is not.</b> This beat is the dramatic engine of Version 4, The Offer, the current favorite among four concept versions on the table. It is explicitly flagged in our working documents as an unresolved question: is Jim actually being offered an IPO right now, was he offered one in the past, or is this a hypothetical framing device? Do not present this as a confirmed real event anywhere it is used — in pitches, in the tool, in any cut of the film.<br><br><b>The thesis it's built to carry.</b> Jim cannot take the company public — not because it would be bad business, but because eighty years of built empathy make it physically impossible for him to cause pain to 5,000 people. The film is about how that empathy was built and why it must not be lost. An IPO would reportedly bring personal wealth in the billions and secure five generations of descendants financially, while transferring 5,000 employees' fates to shareholders — the treatment's core tension is precisely between those two outcomes.<br><br><b>Structure sketch (The Offer, 90–95 min, 5 acts).</b> Opening (0–10 min), \"The folder on the desk\" — Jim's morning, voice-over laying out the arguments for an IPO, Jim sits at his desk, an \"IPO PROPOSAL\" folder in front of him, he says nothing. Act I (10–25 min), \"The case for\" — the voice of the world (consultants, Wall Street), the audience nearly persuaded. Act II (25–60 min), \"The case against\" — the five empathy stages as evidence. Act III (60–85 min), \"The decision. A tour of the company\" — Jim walks the production floor and R&D, archival-interview voice-over laid over present-day footage; he returns to his desk, does not sign the folder, puts it in the bottom drawer. A possible closing line — flagged explicitly as DRAFT, not a real quote — is \"Maybe next year.\" Epilogue (85–95 min), \"Morning. Nobody knows\" — an ordinary morning, employees unaware that yesterday he set aside three billion dollars for their sake.<br><br><b>Open questions (do not resolve on screen without confirming first).</b> Whether the IPO offer is actually live; who voices the arguments for it; which family members or employees participate; whether the film ends on a spoken line from Jim or on silence. There is also a real risk this treatment could feel too exposing for Jim personally — discuss with him directly before committing further.<br><br><b>The other three versions, for balance.</b> Version 1, The Journey — a hike with five symbolic encounters, ending on a mirror at the summit; unresolved: which five encounters, what artefact. Version 2, The Portrait — an anonymous painter working from life while an unguarded interview happens around the sitting, ending on the empty chair and the canvas. Version 3, One Day — pure observational vérité across one day (home → office → home), the riskiest structurally, needs one held object or a morning phone call to avoid flatness. None of the four is rejected; The Offer is simply the one Jim responded to most warmly so far.",ru:"<b>Что это — и что не это.</b> Этот бит — драматургический двигатель версии 4, The Offer, текущего фаворита среди четырёх концепций на столе. В наших рабочих документах прямо помечено как нерешённый вопрос: реально ли Джиму сейчас предлагают IPO, предлагали ли в прошлом, или это гипотетическая рамка. Не подавать это как подтверждённый реальный факт нигде, где это используется — ни в питчах, ни в инструменте, ни в каком-либо монтаже фильма.<br><br><b>Тезис, который это должно нести.</b> Джим не может вывести компанию на биржу — не потому что это плохая бизнес-стратегия, а потому что восемьдесят лет выстроенной эмпатии физически не позволяют ему причинить боль 5000 людям. Фильм — о том, как такая эмпатия формировалась и почему её нельзя терять. IPO, по имеющимся данным, принесло бы личное состояние в миллиарды и обеспечило бы потомков на пять поколений вперёд, одновременно отдав судьбы 5000 сотрудников акционерам — центральное напряжение сценарной заявки именно между этими двумя исходами.<br><br><b>Набросок структуры (The Offer, 90–95 мин, 5 актов).</b> Открытие (0–10 мин) «Папка на столе» — утро Джима, закадровый голос проговаривает аргументы за IPO, Джим садится за стол, перед ним папка «IPO PROPOSAL», он молчит. Акт I (10–25 мин) «Аргументы за» — голос мира (консультанты, Уолл-стрит), зритель почти убеждён. Акт II (25–60 мин) «Аргументы против» — пять этапов эмпатии как доказательство. Акт III (60–85 мин) «Решение. Тур по компании» — Джим обходит производство и R&D, поверх настоящего идёт закадровый голос из архивных интервью; он возвращается к столу, не подписывает папку, кладёт её в нижний ящик. Возможная финальная реплика — прямо помечена как ЧЕРНОВИК, не реальная цитата — «Maybe next year». Эпилог (85–95 мин) «Утро. Никто не знает» — обычное утро, сотрудники не знают, что вчера он отложил три миллиарда ради них.<br><br><b>Открытые вопросы (не закрывать в кадре без предварительного подтверждения).</b> Реально ли актуально предложение IPO; кто озвучивает аргументы «за»; кто из семьи или сотрудников участвует; заканчивается ли фильм произнесённой репликой Джима или молчанием. Есть и реальный риск, что эта трактовка может показаться слишком оголяющей для самого Джима лично — обсудить с ним напрямую, прежде чем двигаться дальше.<br><br><b>Остальные три версии, для баланса.</b> Версия 1, «Путешествие» — хайкинг с пятью символическими встречами, финал — зеркало на вершине; нерешено: какие пять встреч, какой артефакт. Версия 2, «Портрет» — анонимный художник пишет с натуры, пока вокруг сеанса идёт непринуждённое интервью, финал — пустое кресло и холст. Версия 3, «Один день» — чистая наблюдательная вертите на протяжении одного дня (дом → офис → дом), самая рискованная по структуре, нужен один сквозной предмет или утренний звонок, чтобы избежать «плоскости». Ни одна из четырёх не отклонена; The Offer просто та, на которую Джим откликнулся теплее прочих на данный момент."}}
];

  1:{en:"The film opens on Jim at his desk in the morning. A folder marked \"IPO PROPOSAL\" sits in front of him. He says nothing. This is the Opening Image — the \"before\" snapshot the Final Image will answer. Everything the film argues, for and against, starts from this silence.",ru:"Фильм открывается на Джиме за столом утром. Перед ним папка «IPO PROPOSAL». Он молчит. Это открывающий образ — снимок «до», на который ответит финальный образ. Всё, что фильм будет доказывать — за и против, — начинается с этой тишины."},

  5:{en:"The first empathy stage: Kentucky, poverty, a one-room schoolhouse, hunting squirrels for food. Empathy learned as a survival skill, long before any business existed.",ru:"Первый этап эмпатии: Кентукки, бедность, школа в одну комнату, охота на белок ради еды. Эмпатия, выученная как навык выживания, задолго до всякого бизнеса."},

  9:{en:"The fifth and final stage: losing Rob Grice, the closest friend of his business life, to a motorcycle accident. Empathy learning to lose — the hardest lesson, and the most recent.",ru:"Пятый и последний этап: потеря Роба Грайса, ближайшего друга по бизнесу, в аварии на мотоцикле. Эмпатия учится терять — самый трудный урок, и самый недавний."},
  10:{en:"Act III opens: Jim walks the production floor, watching the people the folder would affect. Archival-interview voice-over runs over present-day footage of the company he built.",ru:"Начинается Акт III: Джим обходит производство, глядя на людей, которых затронула бы папка. Поверх сегодняшних кадров компании, которую он построил, идёт закадровый голос из архивных интервью."},

    brief:{en:"<b>Who she is.</b> A food critic who was a dinner guest at Jim's house on the evening of the attempted kidnapping on Galaxy Drive. She later wrote about it as \"the most exciting dinner\" she'd attended.<br><br><b>Why this film.</b> She is a real, nameable, independent witness to empathy stage 4 (the kidnapping attempt) — someone outside the family who can corroborate the event happened and describe it from a guest's perspective, which is valuable precisely because it isn't Jim describing his own trauma.<br><br><b>What only she gives.</b> An outside eyewitness account of the kidnapping-attempt evening — what she actually saw and how the house reacted, as someone who was there for an unrelated reason (dinner) and got pulled into the story.<br><br><b>What to ask.</b><br>1) \"Tell me about that dinner — what did you notice before anything happened?\" <br>2) \"What did the room feel like once it became clear something was wrong?\" <br>3) \"You wrote about it afterward — what made you want to?\"<br><br><b>How to approach / caution.</b> A food critic, likely comfortable being interviewed and quoted; approach as an independent witness, not a Glidewell-adjacent voice.<br><br><b>Verify before shooting.</b> Locate her original write-up of \"the most exciting dinner\" and confirm the exact date/year of the incident with her, since our material only says \"early 2000s.\"<br><br><b>Confidence.</b> Solid: she exists, was present, and wrote about the evening. Unconfirmed: exact date and whether she is willing/available to be interviewed now.",ru:"<b>Кто она.</b> Кулинарный критик, гостья на ужине в доме Джима вечером, когда произошла попытка похищения на Galaxy Drive. Позже написала об этом как о «самом захватывающем ужине», на котором бывала.<br><br><b>Зачем фильму.</b> Она реальный, именованный, независимый свидетель этапа эмпатии 4 (попытка похищения) — человек вне семьи, способный подтвердить, что событие произошло, и описать его с точки зрения гостьи, что ценно   phil:{nm:"Employee (to cast)", a:18, sc:[2,10,11,13], g:"g", status:"ok",
    brief:{en:"<b>Who he is.</b> A Glidewell employee who recently retired after 47 years at the company.<br><br><b>Why this film.</b> He is the human scale of what an IPO would actually put at risk — not an abstraction (\"5,000 employees\") but one specific person who gave nearly five decades to this company. In The Offer's Act III, he is a natural anchor for the company-tour scenes: Jim walking the floor, seeing the people the folder would affect.<br><br><b>What only he gives.</b> 47 years of first-hand memory of the company's whole arc — from whatever it was when he started, through every phase of growth, to today. A living measure of tenure that makes \"protecting jobs\" concrete instead of rhetorical.<br><br><b>What to ask.</b><br>1) \"Take me through what the company looked like when you started, versus now.\" <br>2) \"What has Jim actually been like to work for, across 47 years?\" <br>3) \"What would it have meant to you if the company had gone public at some point in your career?\" — invites his own, non-scripted read on the IPO stakes.<br><br><b>How to approach / caution.</b> Recently retired — should be comfortable speaking candidly, but confirm current comfort level and any concerns about discussing hypothetical company decisions.<br><br><b>Verify before shooting.</b> Full name, exact retirement date, and role(s) held across 47 years — currently only \"Phil, 47-year employee, recently retired.\"<br><br><b>Confidence.</b> Solid: tenure and recent retirement. Unconfirmed: full name, specific roles, and willingness to speak on camera about hypothetical IPO stakes.",ru:"<b>Кто он.</b> Сотрудник Glidewell, недавно вышедший на пенсию после 47 лет в компании.<br><br><b>Зачем фильму.</b> Он — человеческий масштаб того, чем реально рискует IPO, — не абстракция («5000 сотрудников»), а один конкретный человек, отдавший компании почти пять десятилетий. В Акте III The Offer он естественный якорь для сцен тура по компании: Джим идёт по цеху, видит людей, которых затронула бы папка.<br><br><b>Что только он даёт.</b> 47 лет памяти из первых рук о всей дуге компании — от того, какой она была на его старте, через все фазы роста, до сегодня. Живая мера стажа, делающая «защиту рабочих мест» конкретной, а не риторической.<br><br><b>О чём спрашивать.</b><br>1) «Проведите меня через то, какой была компания, когда вы начинали, и какая она сейчас.» <br>2) «Каким Джим реально был как работодатель за 47 лет?» <br>3) «Что для вас значило бы, если бы компания в какой-то момент вашей карьеры вышла на биржу?» — приглашает его собственное, несценарированное мнение о ставках IPO.<br><br><b>Как заходить / осторожно.</b> Недавно вышел на пенсию — должен быть готов говорить откровенно, но подтвердить текущий уровень комфорта и возможные опасения по поводу обсуждения гипотетических решений компании.<br><br><b>Проверить перед съёмкой.</b> Полное имя, точная дата выхода на пенсию и роль(и) за 47 лет — сейчас известно только «Фил, сотрудник 47 лет, недавно на пенсии».<br><br><b>Уверенность.</b> Твёрдо: стаж и недавний выход на пенсию. Не подтверждено: полное имя, конкретные роли и готовность говорить в кадре о гипотетических ставках IPO."},
    rl:{en:"47-year employee · retired",ru:"47 лет в компании · на пенсии"}, role:{en:"Recently retired, 47 years at Glidewell",ru:"Недавно вышел на пенсию, 47 лет в Glidewell"}, loc:{en:"Irvine area",ru:"Район Ирвайна"},
    theme:{en:"The human scale of the IPO stakes — one person, 47 years.",ru:"Человеческий масштаб ставок IPO — один человек, 47 лет."},

  eileen:{nm:"Eileen", a:2, sc:[], g:"x", status:"limited",
    brief:{en:"<b>Who she is.</b> Jim's stepmother — his father remarried to her after Jim's mother left. She took Jim to Knott's Berry Farm around 1956–57.<br><br><b>Why this film.</b> Part of the Las Vegas years that bridge Kentucky and the robbery at 17 — the household Jim returned to as a latchkey kid.<br><br><b>Caution — unresolved sourcing.</b> Our material contains two different characterizations of a stepmother figure from this period that have not been reconciled: one is a neutral description (took Jim to Knott's Berry Farm), the other characterizes a stepmother as a gambler and alcoholic. Do not merge these into one account or attribute the negative characterization to Eileen specifically without checking directly with Jim or family first — this is exactly the kind of unverified claim that must not reach the screen unresolved.<br><br><b>What to ask (if this beat proceeds).</b> Only with direct family confirmation of who is being described and consent to address it on camera.<br><br><b>Verify before shooting.</b> Whether she is living, reachable, and whether the negative characterization in our source material refers to her at all — resolve before using her name in connection with it.<br><br><b>Confidence.</b> Solid: she married Jim's father and took him to Knott's Berry Farm. Unresolved: her overall character, and whether a separate negative account refers to her or to someone else.",ru:"<b>Кто она.</b> Мачеха Джима — отец женился на ней повторно после того, как мать Джима уехала. Она возила Джима в Knott's Berry Farm около 1956–57 годов.<br><br><b>Зачем фильму.</b> Часть вегасских лет, связывающих Кентукки и ограбление в 17 лет — дом, в который Джим вернулся как «ребёнок с ключом на шее».<br><br><b>Осторожно — несведённые источники.</b> В наших материалах есть две разные характеристики фигуры мачехи этого периода, которые не сведены между собой: одна нейтральна (возила Джима в Knott's Berry Farm), другая характеризует мачеху как игрока и алкоголичку. Не объединять их в одну версию и не приписывать негативную характеристику именно Эйлин без прямой проверки с Джимом или семьёй — это ровно тот тип неподтверждённого утверждения, который не должен попасть на экран несведённым.<br><br><b>О чём спрашивать (если бит развивается).</b> Только при прямом подтверждении семьи, о ком именно речь, и согласии обсуждать это в кадре.<br><br><b>Проверить перед съёмкой.</b> Жива ли она, доступна ли, и относится ли негативная характеристика в наших материалах к ней вообще — решить до использования её имени в этой связи.<br><br><b>Уверенность.</b> Твёрдо: вышла замуж за отца Джима и возила его в Knott's Berry Farm. Не сведено: её характер в целом и относится ли отдельный негативный рассказ к ней или к кому-то другому."},

// place a pillar name to the left of each cluster of its marks (no labels in empty space)
function clusterLabels(xs,y,name,color,attr){
  if(!xs.length) return '';
  xs=xs.slice().sort((a,b)=>a-b);
  const cls=attr?'prowlbl plbl-click':'prowlbl';
  let out='', gs=xs[0], prev=xs[0];
  const flush=gx=>{ out+='<text class="'+cls+'" '+(attr||'')+' x="'+(gx-13)+'" y="'+y+'" fill="'+color+'" text-anchor="end">'+name+'</text>'; };
  for(let i=1;i<xs.length;i++){ if(xs[i]-prev>650){ flush(gs); gs=xs[i]; } prev=xs[i]; }
  flush(gs); return out;
}

const BEATSHEET = [
  {nm:{en:"Opening Image",ru:"Открывающий образ"}, pos:0, pct:"0%", t:{en:"0:00",ru:"0:00"},
   desc:{en:"A \"before\" snapshot — the tone, the world and the hero's flaw before any change. It sets the bar the Final Image will answer.",ru:"Снимок «до» — тон, мир и изъян героя до изменений. Задаёт планку, на которую ответит финальный образ."},
   idea:{en:"• <b>Version 4, The Offer (current favorite).</b> Jim at his desk in the morning, an unsigned folder marked \"IPO PROPOSAL\" in front of him. He says nothing. The silence is the flaw on display — a decision he cannot yet face.<br>• <b>Version 1, The Journey.</b> Jim setting out alone on a hike — establishing shot of a man walking toward something unclear, before any of the five symbolic encounters.<br>• <b>Version 2, The Portrait.</b> An empty chair and a blank canvas in the sitting room, before Jim or the anonymous painter arrive — the space waiting to be filled.<br>• <b>Version 3, One Day.</b> Jim waking at home, before the day's one held object (a phone call, an artefact in his pocket) is introduced — the plainest, most observational opening of the four, and the riskiest without that anchor.",ru:"• <b>Версия 4, The Offer (текущий фаворит).</b> Джим за столом утром, перед ним неподписанная папка «IPO PROPOSAL». Молчит. Тишина — и есть изъян на виду: решение, которое он пока не может принять.<br>• <b>Версия 1, «Путешествие».</b> Джим один выходит в хайкинг — общий план человека, идущего к чему-то неясному, до всех пяти символических встреч.<br>• <b>Версия 2, «Портрет».</b> Пустое кресло и чистый холст в гостиной для приёмов, до прихода Джима или анонимного художника — пространство, ожидающее заполнения.<br>• <b>Версия 3, «Один день».</b> Джим просыпается дома, до того как введён единственный сквозной предмет дня (звонок, артефакт в кармане) — самое простое, наблюдательное открытие из четырёх, и самое рискованное без этого якоря."}},
  {nm:{en:"Theme Stated",ru:"Заявление темы"}, pos:5, pct:"5%", t:{en:"5:00",ru:"5:00"},
   desc:{en:"Someone states (often to the hero, who ignores it) what the story is really about — the truth the hero must learn by the end.",ru:"Кто-то проговаривает (часто герою, который пропускает мимо ушей), о чём история на самом деле — истину, которую герою предстоит усвоить."},
   idea:{en:"• <b>The Offer.</b> A voice-over line from the \"case for\" side — a consultant or banker saying, in effect, that a business is just numbers. The theme (that Jim's empathy makes this untrue for him) is stated as its opposite, and the film spends two acts proving it wrong.<br>• <b>The Journey.</b> One of the five people Jim meets on the hike says something that names the theme without him absorbing it yet — TBD which of the five and what exactly, per the treatment's own open question.<br>• <b>The Portrait.</b> The painter (unseen, hands only) says something offhand mid-sitting about what a portrait is for — capturing what a photograph can't. Jim doesn't register it as being about himself yet.<br>• <b>One Day.</b> A voice-over from archival interview, laid over an ordinary present-day action, states the theme obliquely — this is the version's main device for weaving in the past.",ru:"• <b>The Offer.</b> Закадровая реплика со стороны «аргументов за» — консультант или банкир говорит, по сути, что бизнес — это просто цифры. Тема (что эмпатия Джима делает это неправдой для него) заявлена как её противоположность, и фильм тратит два акта, чтобы это опровергнуть.<br>• <b>«Путешествие».</b> Один из пяти встречных на хайкинге говорит что-то, называющее тему, которую герой пока не воспринимает, — TBD, кто из пяти и что именно, согласно открытому вопросу самой заявки.<br>• <b>«Портрет».</b> Художник (не в кадре, только руки) говорит невзначай во время сеанса что-то о назначении портрета — уловить то, что не уловит фото. Джим пока не воспринимает это как сказанное о нём.<br>• <b>«Один день».</b> Закадровый голос из архивного интервью, наложенный на обычное сегодняшнее действие, косвенно заявляет тему — это главный приём версии для вплетения прошлого."}},
  {nm:{en:"Set-Up",ru:"Завязка"}, pos:8, a:1, b:10, pct:"1–10%", t:{en:"0–10 min",ru:"0–10 мин"},
   desc:{en:"Establish the hero, their world, what's missing, the stakes and the supporting cast. Plant the things that will pay off later.",ru:"Знакомим с героем, его миром, тем, чего не хватает, ставками и окружением. Сеем то, что выстрелит позже."},
   idea:{en:"• <b>The Offer.</b> Establish Jim's daily world — the campus, Parvina, an ordinary morning at the company — before the folder's weight is explained. Plant Phil (47 years) and the scale of who the decision would affect.<br>• <b>The Journey.</b> Establish the hike's terrain and Jim's solitary pace; plant that five encounters are coming without revealing who.<br>• <b>The Portrait.</b> Establish the sitting-room setting and the three levels of observation (painter→Jim, camera→both, viewer→all) before the interview proper begins.<br>• <b>One Day.</b> Establish the home→office→home rhythm of an ordinary day, and plant whichever anchor object or call the director chooses to prevent the day from feeling flat.",ru:"• <b>The Offer.</b> Установить повседневный мир Джима — кампус, Парвина, обычное утро в компании — до того как объяснён вес папки. Заложить Фила (47 лет) и масштаб тех, кого затронет решение.<br>• <b>«Путешествие».</b> Установить рельеф хайкинга и одинокий темп Джима; заложить, что грядут пять встреч, не раскрывая, с кем.<br>• <b>«Портрет».</b> Установить обстановку гостиной для приёмов и три уровня наблюдения (художник→Джим, камера→оба, зритель→всё) до начала собственно интервью.<br>• <b>«Один день».</b> Установить ритм обычного дня дом→офис→дом и заложить тот сквозной предмет или звонок, который режиссёр выберет, чтобы день не выглядел плоским."}},
  {nm:{en:"Catalyst",ru:"Катализатор"}, pos:11, pct:"10–12%", t:{en:"10–12 min",ru:"10–12 мин"},
   desc:{en:"The inciting incident — news or an event that knocks the hero's world off balance. No going back to the way things were.",ru:"Запускающее событие — новость или случай, выбивающий мир героя из равновесия. Назад к прежнему уже нельзя."},
   idea:{en:"• <b>The Offer (where the four versions diverge most).</b> The folder itself — the IPO proposal literally arriving or being reopened. <b>Unresolved and important:</b> our source material flags that whether this offer is real, current, past, or hypothetical is NOT confirmed — this Catalyst may be a real event or a dramatized framing device, and that must be settled with Jim before shooting, not decided by the director alone.<br>• <b>The Journey.</b> The first of the five encounters — whoever that turns out to be — hands Jim the first artefact.<br>• <b>The Portrait.</b> The painter's first unscripted question breaks the formality of a normal interview, catching Jim off guard.<br>• <b>One Day.</b> The morning phone call (if that's the chosen anchor) — a specific piece of news that colors the rest of the day.",ru:"• <b>The Offer (где четыре версии расходятся сильнее всего).</b> Сама папка — предложение IPO буквально приходит или снова открывается. <b>Нерешено и важно:</b> наши материалы прямо помечают, что реальность, актуальность и природа этого предложения — прошлое или гипотетическое — НЕ подтверждены; этот Катализатор может быть реальным событием или драматургическим приёмом, и это нужно решить с Джимом до съёмки, а не режиссёру в одиночку.<br>• <b>«Путешествие».</b> Первая из пяти встреч — кто бы это ни оказался — передаёт Джиму первый артефакт.<br>• <b>«Портрет».</b> Первый несценарный вопрос художника ломает формальность обычного интервью, ловя Джима врасплох.<br>• <b>«Один день».</b> Утренний телефонный звонок (если это выбранный якорь) — конкретная новость, окрашивающая остаток дня."}},
  {nm:{en:"Debate",ru:"Спор"}, pos:14, a:12, b:25, pct:"12–25%", t:{en:"12–25 min",ru:"12–25 мин"},
   desc:{en:"The hero hesitates — \"should I go?\" The last gasp of the old way; the central question of the film is posed.",ru:"Герой колеблется — «идти ли?». Последний вздох старого уклада; ставится центральный вопрос фильма."},
   idea:{en:"• <b>The Offer.</b> Act I proper — the voice of the world makes its case in full: personal wealth in the billions, five generations of descendants secured. The audience is meant to be nearly persuaded before Act II answers it.<br>• <b>The Journey.</b> Jim weighs whether to continue the hike or turn back after the first encounter unsettles him.<br>• <b>The Portrait.</b> Jim debates, visibly, whether to actually answer the painter's question or retreat into a rehearsed answer.<br>• <b>One Day.</b> The quietest version of this beat — a held pause before Jim commits to how he'll handle whatever the day's anchor event demands.",ru:"• <b>The Offer.</b> Собственно Акт I — голос мира приводит доводы полностью: личное состояние в миллиарды, пять поколений потомков обеспечены. Зритель должен быть почти убеждён, прежде чем Акт II на это ответит.<br>• <b>«Путешествие».</b> Джим взвешивает, продолжать ли хайкинг или повернуть назад после того, как первая встреча его тревожит.<br>• <b>«Портрет».</b> Джим заметно колеблется — ответить ли на вопрос художника по-настоящему или уйти в заготовленный ответ.<br>• <b>«Один день».</b> Самый тихий вариант этого бита — задержанная пауза перед тем, как Джим решает, как справится с тем, что требует событие-якорь дня."}},
  {nm:{en:"Break into Two",ru:"Переход во 2-й акт"}, pos:25, pct:"25%", t:{en:"25 min",ru:"25 мин"},
   desc:{en:"The hero makes a choice and steps into the new world of Act Two — deliberately, the antithesis of the opening.",ru:"Герой делает выбор и шагает в новый мир второго акта — осознанно; антитеза открытию."},
   idea:{en:"• <b>The Offer.</b> Jim doesn't decide yet — instead he lets the argument turn inward: Act II opens on Kentucky. The turn IS the decision to look at his own life instead of the spreadsheet.<br>• <b>The Journey.</b> Jim commits to the full five-encounter path rather than turning back.<br>• <b>The Portrait.</b> Jim stops giving rehearsed answers and starts actually talking — the sitting becomes a real conversation.<br>• <b>One Day.</b> The day's anchor event fully activates — whatever was called in that morning becomes the day's real center.",ru:"• <b>The Offer.</b> Джим пока не решает — вместо этого он позволяет аргументу развернуться вовнутрь: Акт II открывается на Кентукки. Сам разворот И ЕСТЬ решение — смотреть на собственную жизнь, а не в таблицу.<br>• <b>«Путешествие».</b> Джим решает пройти весь путь из пяти встреч, а не поворачивать назад.<br>• <b>«Портрет».</b> Джим прекращает давать заготовленные ответы и начинает говорить по-настоящему — сеанс становится настоящим разговором.<br>• <b>«Один день».</b> Событие-якорь дня полностью активируется — то, о чём был утренний звонок, становится настоящим центром дня."}},
  {nm:{en:"B Story",ru:"Второстепенная линия (B)"}, pos:28, pct:"22–30%", t:{en:"25–30 min",ru:"25–30 мин"},
   desc:{en:"A secondary story, usually carrying the film's theme in a smaller, more human register.",ru:"Второстепенная линия, обычно несущая тему фильма в меньшем, более человеческом регистре."},
   idea:{en:"• <b>The Offer.</b> Parvina's line — her stated preference for this version and her own read on what an IPO would cost the family, not just the company.<br>• <b>The Journey / Portrait / One Day.</b> Each version's B story would likely be one specific family member (a child, Parvina) whose presence quietly carries the film's human stakes alongside the main device.",ru:"• <b>The Offer.</b> Линия Парвины — её заявленное предпочтение этой версии и её собственный взгляд на то, чего IPO стоило бы семье, не только компании.<br>• <b>«Путешествие» / «Портрет» / «Один день».</b> B-линией каждой версии, вероятно, стал бы один конкретный член семьи (ребёнок, Парвина), чьё присутствие тихо несёт человеческую ставку фильма рядом с основным приёмом."}},
  {nm:{en:"Fun and Games",ru:"Обещание концепции"}, pos:37, a:30, b:50, pct:"30–50%", t:{en:"30–50 min",ru:"30–50 мин"},
   desc:{en:"The \"promise of the premise\" — the part of the film the poster/trailer actually sells; the concept delivered in its purest form.",ru:"«Обещание концепции» — та часть фильма, которую реально продаёт постер/трейлер; концепция в чистом виде."},
   idea:{en:"• <b>The Offer.</b> Empathy stages 1–3 (Kentucky, Las Vegas at 17, Vietnam) — the film's real content, delivered as biography rather than argument.<br>• <b>The Journey.</b> The middle encounters — whichever facets of Jim's personality the five people are meant to reveal.<br>• <b>The Portrait.</b> The bulk of the actual painting sessions and the unguarded conversation they enable.<br>• <b>One Day.</b> The office portion of the day — the company itself as spectacle, if a special rather than ordinary day is chosen.",ru:"• <b>The Offer.</b> Этапы эмпатии 1–3 (Кентукки, Лас-Вегас в 17, Вьетнам) — настоящее содержание фильма, поданное как биография, а не аргумент.<br>• <b>«Путешествие».</b> Средние встречи — какие бы грани личности Джима ни должны раскрыть пятеро встречных.<br>• <b>«Портрет».</b> Основная часть собственно сеансов живописи и непринуждённого разговора, который они позволяют.<br>• <b>«Один день».</b> Офисная часть дня — сама компания как зрелище, если выбран особый, а не обычный день."}},
  {nm:{en:"Midpoint",ru:"Мидпоинт"}, pos:50, pct:"50%", t:{en:"50 min",ru:"50 мин"},
   desc:{en:"A false victory or false defeat that raises the stakes and shifts the film from reactive to proactive.",ru:"Ложная победа или ложное поражение, повышающее ставки и переводящее героя из реактивного состояния в проактивное."},
   idea:{en:"• <b>The Offer (sharpest divergence point).</b> Empathy stage 4 — the fourth gun barrel, the Newport Beach kidnapping attempt. A false defeat: surviving repeatedly starts to feel like a debt owed, raising the stakes for what comes next (Rob Grice's death).<br>• <b>The Journey.</b> The mirror moment — described in the treatment as appearing \"at the summit,\" though structurally it could land here rather than at the very end; unresolved which.<br>• <b>The Portrait.</b> The painter says something that makes Jim realize he's been talking to a stranger more honestly than to people he knows — a false victory that deepens rather than resolves.<br>• <b>One Day.</b> Whatever the day's anchor event resolves into at its midpoint — this version's biggest structural risk, per the treatment's own honesty about it being \"the riskiest dramaturgically.\"",ru:"• <b>The Offer (точка самого острого расхождения).</b> Этап эмпатии 4 — четвёртое дуло, попытка похищения в Newport Beach. Ложное поражение: многократное выживание начинает ощущаться как долг, повышая ставки для того, что впереди (смерть Роба Грайса).<br>• <b>«Путешествие».</b> Момент зеркала — в заявке описан как происходящий «на вершине», хотя структурно может лечь и здесь, а не в самом конце; не решено, где именно.<br>• <b>«Портрет».</b> Художник говорит что-то, из-за чего Джим понимает, что говорил с незнакомцем честнее, чем с близкими, — ложная победа, которая скорее углубляет, чем разрешает.<br>• <b>«Один день».</b> То, во что разрешается событие-якорь дня в своей середине, — самый большой структурный риск этой версии, по собственному признанию заявки, что это «самая рискованная драматургически»."}},
  {nm:{en:"Bad Guys Close In",ru:"Враги наступают"}, pos:62, a:55, b:75, pct:"55–75%", t:{en:"55–75 min",ru:"55–75 мин"},
   desc:{en:"External and internal pressure mounts; doubt, fragmentation, and old patterns creep back in.",ru:"Внешнее и внутреннее давление растёт; сомнение, раздробленность, возвращаются старые паттерны."},
   idea:{en:"• <b>The Offer.</b> The IPO argument resurfaces, now harder to dismiss because the audience has seen how much good it could concretely do (five generations secured) — the pressure isn't external villainy, it's a genuinely strong counter-argument returning.<br>• <b>The Journey / Portrait / One Day.</b> Each version's own version of doubt creeping back — the hike getting harder, the sitting growing tense, the day's anchor event threatening to not resolve cleanly.",ru:"• <b>The Offer.</b> Аргумент за IPO возвращается, и теперь его труднее отбросить, потому что зритель уже увидел, сколько конкретного добра он мог бы сделать (пять поколений обеспечены) — давление не внешнее злодейство, а по-настоящему сильный контраргумент, вернувшийся снова.<br>• <b>«Путешествие» / «Портрет» / «Один день».</b> Собственная версия каждой концепции возвращающегося сомнения — хайкинг становится труднее, сеанс — напряжённее, событие-якорь дня грозит не разрешиться гладко."}},
  {nm:{en:"All Is Lost",ru:"Всё потеряно"}, pos:75, pct:"75%", t:{en:"75 min",ru:"75 мин"},
   desc:{en:"The lowest point — often a \"whiff of death,\" literal or symbolic.",ru:"Низшая точка — часто «дуновение смерти», буквальное или символическое."},
   idea:{en:"• <b>The Offer (sharpest divergence point).</b> Empathy stage 5 — Rob Grice's death, the phone call on a Sunday morning. This is a literal whiff of death, not symbolic, and per our facts document it may be the hardest beat to have Jim revisit on camera — approach with real care, and only with his willingness confirmed in advance.<br>• <b>The Journey.</b> The mirror at the summit, if it lands here rather than at the Midpoint — described as working on a literal, metaphorical, and ethical level at once.<br>• <b>The Portrait.</b> The sitting session where Jim says something he immediately seems to regret revealing.<br>• <b>One Day.</b> Whatever the anchor event's worst turn looks like — the version's structural Achilles' heel, per the treatment's own honesty about the risk.",ru:"• <b>The Offer (точка самого острого расхождения).</b> Этап эмпатии 5 — смерть Роба Грайса, звонок в воскресенье утром. Это буквальное, не символическое дуновение смерти, и, по нашему факт-документу, возможно, самый трудный бит для повторного переживания Джимом в кадре — подходить с настоящей осторожностью и только при заранее подтверждённой готовности.<br>• <b>«Путешествие».</b> Зеркало на вершине, если оно ложится здесь, а не на мидпоинте, — описано как работающее одновременно на буквальном, метафорическом и этическом уровне.<br>• <b>«Портрет».</b> Сеанс, на котором Джим говорит что-то, о раскрытии чего сразу как будто жалеет.<br>• <b>«Один день».</b> Каким бы ни оказался худший поворот события-якоря — структурная ахиллесова пята версии, по собственному признанию заявки о риске."}},
  {nm:{en:"Dark Night of the Soul",ru:"Тёмная ночь души"}, pos:80, a:75, b:85, pct:"75–85%", t:{en:"75–85 min",ru:"75–85 мин"},

   idea:{en:"• <b>The Offer.</b> Jim alone with what all five stages add up to — not yet deciding, just sitting with the weight of a life that makes 5,000 people feel like family rather than a line item.<br>• <b>Inherited note (from the company-film seed material, belongs here).</b> A possible line — flagged explicitly as DRAFT/placeholder, NOT a confirmed quote, needs replacing with something real from a transcript — is \"Nobody expected anything from me. Which, it turns out, is a very free place to start.\" Do not use this on screen until matched to an actual transcript line.<br>• <b>The Journey / Portrait / One Day.</b> Each version's quietest, most private moment — the point where the device (hike, painting, observed day) briefly stops working as a device and just holds a man alone with himself.",ru:"• <b>The Offer.</b> Джим один с тем, во что складываются все пять этапов, — ещё не решает, просто сидит с тяжестью жизни, из-за которой 5000 человек ощущаются как семья, а не строка в бюджете.<br>• <b>Унаследованная заметка (из seed-материалов company-film, принадлежит здесь).</b> Возможная реплика — прямо помечена как ЧЕРНОВИК/плейсхолдер, НЕ подтверждённая цитата, нужно заменить настоящей из транскрипта — «Nobody expected anything from me. Which, it turns out, is a very free place to start.» Не использовать в кадре до сопоставления с реальной строкой транскрипта.<br>• <b>«Путешествие» / «Портрет» / «Один день».</b> Самый тихий, самый личный момент каждой версии — точка, где приём (хайкинг, живопись, наблюдаемый день) на миг перестаёт работать как приём и просто держит человека одного с собой."}},

   idea:{en:"• <b>The Offer.</b> Jim gets up from sitting with the weight and walks toward the company floor — the decision isn't spoken yet, but the direction is chosen: he will look at the people, not the number.<br>• <b>The Journey / Portrait / One Day.</b> Each version's equivalent turn toward resolution — completing the hike's final stretch, the sitting's last session, the day's return home.",ru:"• <b>The Offer.</b> Джим встаёт из-под тяжести и идёт к цеху компании — решение ещё не произнесено, но направление выбрано: он будет смотреть на людей, а не на цифру.<br>• <b>«Путешествие» / «Портрет» / «Один день».</b> Эквивалентный поворот к разрешению в каждой версии — финальный отрезок хайкинга, последний сеанс, возвращение домой в конце дня."}},

   idea:{en:"• <b>The Offer (sharpest divergence point).</b> Act III — Jim walks the production floor and R&D, archival-interview voice-over laid over present-day footage; he returns to his desk and does not sign the folder, putting it in the bottom drawer. A possible closing line — DRAFT, not confirmed — is \"Maybe next year.\" Open questions per our facts document: who else, if anyone, is present for this; whether Jim speaks at all or the moment plays in silence.<br>• <b>The Journey.</b> The mirror at the summit (if not used earlier) followed by an anticlimax: an ordinary morning back at the office, Jim setting the artefact down on his desk.<br>• <b>The Portrait.</b> Jim leaves; the camera stays on the empty chair and the finished (or unfinished) canvas.<br>• <b>One Day.</b> The day simply ends — home again — with whatever the anchor object/call/meeting resolved into now sitting quietly in the day's final minutes.",ru:"• <b>The Offer (точка самого острого расхождения).</b> Акт III — Джим обходит производство и R&D, поверх сегодняшних кадров идёт закадровый голос из архивных интервью; он возвращается к столу и не подписывает папку, кладёт её в нижний ящик. Возможная финальная реплика — ЧЕРНОВИК, не подтверждена — «Maybe next year». Открытые вопросы по нашему факт-документу: кто ещё, если вообще кто-то, присутствует при этом; произносит ли Джим хоть слово, или момент проходит в молчании.<br>• <b>«Путешествие».</b> Зеркало на вершине (если не использовано раньше), а затем антикульминация: обычное утро снова в офисе, Джим кладёт артефакт на стол.<br>• <b>«Портрет».</b> Джим уходит; камера остаётся на пустом кресле и готовом (или неготовом) холсте.<br>• <b>«Один день».</b> День просто заканчивается — снова дом — а то, во что разрешился предмет-якорь/звонок/встреча, теперь тихо лежит в последних минутах дня."}},
  {nm:{en:"Final Image",ru:"Финальный образ"}, pos:100, pct:"100%", t:{en:"end",ru:"конец"},

   idea:{en:"• <b>The Offer.</b> An ordinary morning at the company — employees arriving, none of them aware that yesterday Jim set aside three billion dollars for their sake. Mirrors the Opening Image's silence, but the audience now knows what it costs.<br>• <b>The Journey.</b> Jim at his office desk again, the artefact resting there — the underwhelm is deliberate, per the treatment.<br>• <b>The Portrait.</b> The canvas alone, camera lingering after everyone has left.<br>• <b>One Day.</b> Home again, the day closed — the plainest of the four closings, and the one most dependent on the day itself having carried real weight.",ru:"• <b>The Offer.</b> Обычное утро в компании — сотрудники приходят, никто не знает, что вчера Джим отложил три миллиарда долларов ради них. Рифмуется с тишиной открывающего образа, но теперь зритель знает цену.<br>• <b>«Путешествие».</b> Джим снова за офисным столом, артефакт лежит там — приземлённость финала намеренная, по заявке.<br>• <b>«Портрет».</b> Один холст, камера задерживается после того, как все ушли.<br>• <b>«Один день».</b> Снова дом, день закрыт — самое простое из четырёх завершений, и самое зависимое от того, нёс ли сам день реальный вес."}}

  {id:'jim', nm:{en:"Jim Glidewell",ru:"Джим Глайдвелл"}, c:'#B0442E', loc:{en:"Irvine / Newport Beach, CA",ru:"Ирвайн / Newport Beach, Калифорния"}, sc:[1,5,6,7,8,9,10,11,12,14],
   bio:{en:"<b>The protagonist — confirmed, unlike the company film where he was deliberately kept off the hero list.</b> Here he IS the film. Founder and president of Glidewell, age 80 at the time of writing. Every one of the five empathy-forming stages (Kentucky, the 1962 robbery, Vietnam, four gun barrels, losing Rob Grice) belongs to him directly, and in the current favorite concept (Version 4, The Offer) he is the one weighing an IPO he reportedly cannot bring himself to sign.<br><br><b>Casting status.</b> Confirmed as subject; nothing else about the shoot is confirmed. Four concept versions remain on the table and he has responded most warmly to The Offer so far — that is not the same as the decision being made.<br><br><b>Real quotes we have.</b> Very few are confirmed verbatim in our current material; most of what circulates is paraphrase or reported description, not transcript-sourced quotation. Anything said in his voice in this tool that is not sourced to an actual transcript (C7026, Knottsberry, Thanksgiving, Lunch with Jim, or the book \"Constant Change\") must be marked DRAFT and treated as a placeholder, never presented as something he actually said.<br><br><b>Arc proposals (not decided).</b> The Offer treats his arc as fifty-plus years of built empathy colliding with a single number. The other three versions frame him differently — a solitary hiker meeting five symbolic figures (Journey), a sitter whose guard drops during a portrait session (Portrait), or simply a man observed for one day (One Day). None of the four is rejected.<br><br><b>Physical/logistical constraints.</b> He is 80. Filming stays within Irvine and nearby (Newport Beach, Buena Park); no travel outside the US. Pacing and shoot-day length need to respect his age — this is a hard constraint, not a suggestion.",ru:"<b>Протагонист — подтверждён, в отличие от company-film, где он сознательно не входил в список героев.</b> Здесь он И ЕСТЬ фильм. Основатель и президент Glidewell, 80 лет на момент написания. Каждый из пяти формирующих эмпатию этапов (Кентукки, ограбление 1962, Вьетнам, четыре дула, потеря Роба Грайса) принадлежит ему напрямую, и в текущей фаворитной концепции (версия 4, The Offer) именно он взвешивает IPO, которое, по имеющимся данным, не может заставить себя подписать.<br><br><b>Статус кастинга.</b> Подтверждён как герой; больше ничего о съёмках не подтверждено. Четыре концепции остаются на столе, и пока он теплее всего откликнулся на The Offer — это не то же самое, что принятое решение.<br><br><b>Реальные цитаты, что у нас есть.</b> Очень немногие подтверждены дословно в текущих материалах; большая часть циркулирующего — пересказ или сообщённое описание, не цитата из транскрипта. Всё, что говорится его голосом в этом инструменте и не привязано к настоящему транскрипту (C7026, Knottsberry, Thanksgiving, Lunch with Jim или книге «Constant Change»), должно быть помечено ЧЕРНОВИК и подаваться как плейсхолдер, никогда как то, что он реально сказал.<br><br><b>Предложения по арке (не решено).</b> The Offer трактует его арку как пятьдесят с лишним лет выстроенной эмпатии, столкнувшейся с одной цифрой. Три остальные версии видят его иначе — одинокий путник, встречающий пятерых символических фигур («Путешествие»), модель, чья защита падает во время сеанса портрета («Портрет»), или просто человек, наблюдаемый один день («Один день»). Ни одна из четырёх не отклонена.<br><br><b>Физические/логистические ограничения.</b> Ему 80 лет. Съёмки только в пределах Ирвайна и рядом (Newport Beach, Buena Park); без выездов за пределы США. Темп и длина съёмочных дней должны учитывать его возраст — это жёсткое ограничение, не пожелание."},
   wants:{en:"To protect the 5,000 people who depend on the company — and, underneath that, to never again be the person things simply happen to.",ru:"Защитить 5000 людей, зависящих от компании, — и, под этим, больше никогда не быть тем, с кем просто что-то случается."},
   conflict:{en:"An offer that would secure his own descendants for five generations, weighed against fifty years of learning to feel other people's stakes as his own. Unresolved: whether this offer is a real, current situation or a dramatized framing device — confirm with Jim before treating it as fact.",ru:"Предложение, которое обеспечило бы его потомков на пять поколений, взвешенное против пятидесяти лет учёбы чувствовать чужие ставки как свои. Нерешено: реальна ли эта ситуация сейчас или это драматургический приём — подтвердить с Джимом до подачи как факта."}},

   bio:{en:"<b>A role, not a person yet — deliberately kept generic so we can build the profile step by step, then find and cast the right real person.</b> This hero line stands for what \"5,000 employees\" actually means: one long-tenured worker whose whole adult life is inside the company — the human scale for The Offer's Act III company tour.<br><br><b>Working sketch.</b> Something like a decades-long, recently-retired employee (the source material mentions one once called \"Phil,\" ~47 years); treat that as a starting sketch only, not a locked identity. Full name, department, exact tenure and willingness to appear are all open.<br><br><b>Casting need.</b> A real long-service employee whose stake in an IPO decision is concrete rather than abstract, comfortable on camera, whose story we can verify.",ru:"<b>Это роль, а не конкретный человек — намеренно общая, чтобы шаг за шагом нарисовать образ, а потом найти и выбрать реального человека.</b> Эта линия героя — про то, что реально значит «5000 сотрудников»: один сотрудник с огромным стажем, вся взрослая жизнь которого прошла в компании, — человеческий масштаб для тура по компании в Акте III The Offer.<br><br><b>Черновой набросок.</b> Условно — сотрудник с многолетним стажем, недавно на пенсии (в исходниках упоминается некто «Фил», ~47 лет); это только отправная точка, не зафиксированная личность. Фамилия, отдел, точный стаж и готовность сниматься — всё открыто.<br><br><b>Потребность в кастинге.</b> Реальный сотрудник с большим стажем, чья ставка в решении об IPO конкретна, а не абстрактна, органичный в кадре, чью историю можно проверить."},
   wants:{en:"To see the company he gave most of his working life to keep being what it was for him.",ru:"Видеть, что компания, которой он отдал бóльшую часть трудовой жизни, остаётся тем же, чем была для него."},

  h+='<div class="morep" data-morep="1" style="left:88px;top:168px"><div class="mp-ttl">'+L(UI.moreBtnTitle)+'</div><div class="mp-sub">'+L(UI.moreSub)+' · '+MORE_PEOPLE.reduce((a,b)=>a+b.people.length,0)+'</div></div>';
  // --- Archival book-photo placement helpers (yToX) — company "territory/employees" markers removed ---
  (function(){
    const py=v=>{ v=String(v); if(/today|now|present/i.test(v))return 2026; const m=v.match(/(\d{4})/); if(m)return +m[1]; const d=v.match(/(\d0)s/); if(d){let b=+d[1]; return (b<=30?2000:1900)+b;} return 1970; };
    const yp=BEATS.map(b=>({yr:py(b.y),x:b.x})).filter(p=>p.yr).sort((a,b)=>a.yr-b.yr);
    const yToX=y=>{ if(y<=yp[0].yr)return yp[0].x; for(let i=1;i<yp.length;i++){ if(y<=yp[i].yr){const a=yp[i-1],b=yp[i]; return a.x+(b.x-a.x)*(y-a.yr)/(b.yr-a.yr);} } return yp[yp.length-1].x; };
    // --- Archival book photos: thumbnails ABOVE the line at their year; click → lightbox (no caption) ---
    if(typeof BOOK_PHOTOS!=='undefined' && BOOK_PHOTOS.length){
      const PH=66, PW=Math.round(PH*16/9), GAP=7, TOP=JIMLINEY+8, MINLEFT=268; let lastRight=-1e9;
      [...BOOK_PHOTOS].sort((a,b)=>a.yr-b.yr).forEach((p,i)=>{
        let left=yToX(p.yr)-PW/2; if(left<MINLEFT) left=MINLEFT; if(left<lastRight+GAP) left=lastRight+GAP; lastRight=left+PW;
        h+='<div class="line-photo'+(p.film?' lp-film':'')+(p.archive?' lp-archive':'')+'" data-src="'+p.src+'"'+(p.film?' data-film="'+(typeof p.film==='string'?p.film:'film.html')+'"':'')+(p.archive?' data-archive="1"':'')+' style="left:'+left.toFixed(1)+'px;top:'+TOP+'px;width:'+PW+'px;height:'+PH+'px" title="'+(p.film?'Open Jim\'s film site':p.archive?'Archive hunt':p.yr)+'">'
          +'<img src="'+p.src+'" alt="" onerror="this.closest(\'.line-photo\').remove()">'
          +(p.film?'<span class="lp-badge">▶ The film</span>':'')
          +(p.archive?'<span class="lp-badge">🗄 Archive</span>':'')
          +'</div>';
      });
    }
  })();
  // preview frame thumbnails (lane between Save-the-Cat and Heroes)
  if(typeof SCENE_FRAMES!=='undefined'){
    const FW=Math.round(FRAMEH*16/9), GAP=6;
    for(let k=1;k<=14;k++){
      const arr=SCENE_FRAMES[k]; if(!arr||!arr.length) continue;
      const x0=sbnd[k-1]+4;  // start frames at the BEGINNING (left edge) of the scene
      arr.forEach((fr,i)=>{ const left=x0+i*(FW+GAP);
        h+='<div class="frame-thumb" data-frame-scene="'+k+'" style="left:'+left.toFixed(1)+'px;top:'+FRAMETOP+'px;width:'+FW+'px;height:'+FRAMEH+'px" title="#'+k+' '+L(SCENES[k])+'">'
          +'<img class="frame-img" src="'+fr.src+'" alt="" onerror="this.remove()">'
          +'<span class="frame-ph">#'+k+'</span>'
          +'</div>';
      });
    }
  }
  return h;
}

// format free text into readable blocks: blank-line paragraphs, • / - bullets, **bold**, leading LABEL:
function fmtText(s){
  function esc2(t){return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  return String(s).split(/\n+/).map(function(raw){
    var line=raw.trim(); if(!line) return '';
    var bullet=/^[•\-–]\s?/.test(line); if(bullet) line=line.replace(/^[•\-–]\s?/,'');
    var html=esc2(line).replace(/\*\*(.+?)\*\*/g,'<b>$1</b>').replace(/^([A-ZА-Я][A-ZА-Я0-9 ()\/.,—-]{1,42}:)/,'<b>$1</b>');
    return bullet ? '<div class="fmt-li">'+html+'</div>' : '<p>'+html+'</p>';
  }).join('');
}

const SURVEY_ENDPOINT="https://script.google.com/macros/s/AKfycbz0Q_R7Em__E-_HB48QxGogA9AcBl0Lrd_OnEqbiEoHq4E7oZv9ykoV2WtD7CX5KYsM/exec"; // Jim-timeline visit/survey receiver (Google Apps Script)
// Visit log: one silent ping per page load. Named links (…/?u=bobbie) tag who; no ?u → "anon".
function gwLogVisit(){
  if(!SURVEY_ENDPOINT) return;
  try{
    var u=(new URLSearchParams(location.search).get('u')||'anon').slice(0,60);
    var payload={type:'visit', user:u, ua:navigator.userAgent, ref:document.referrer||''};
    fetch(SURVEY_ENDPOINT,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)});
  }catch(e){}
}

const SURVEY_FAM=[
  {v:'no',    en:"Don't know", ru:'Не знаю'},

function svEsc(s){ return String(s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
function svSubmit(){
  const d=svLoad(), st=document.getElementById('sv-status');
  const rows=Object.keys(d.answers||{}).filter(id=>d.answers[id]&&(d.answers[id].fam||d.answers[id].connect))
    .map(id=>({id:id, name:SPK[id]?SPK[id].nm:id, familiarity:d.answers[id].fam||'', connect:d.answers[id].connect||''}));
  if(!d.name||!d.name.trim()){ if(st)st.textContent=L({en:'Enter your name first.',ru:'Сначала впишите имя.'}); return; }
  if(!rows.length){ if(st)st.textContent=L({en:'Mark at least one person.',ru:'Отметьте хотя бы одного.'}); return; }
  const payload={respondent:d.name.trim(), answers:rows};
  if(!SURVEY_ENDPOINT){ if(st)st.textContent=L({en:'Receiver not connected yet (Apps Script URL needed).',ru:'Приёмник ещё не подключён (нужен URL Apps Script).'}); console.log('SURVEY payload (not sent):',payload); return; }
  if(st)st.textContent=L({en:'Sending…',ru:'Отправляю…'});
  fetch(SURVEY_ENDPOINT,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)})
    .then(()=>{ if(st)st.textContent=L({en:'Thanks — sent ✓',ru:'Спасибо — отправлено ✓'}); })

window.addEventListener('pointerup',()=>{down=false;scroller.classList.remove('grabbing');});
scroller.tabIndex=0;
scroller.addEventListener('keydown',e=>{if(e.key==='ArrowRight')scroller.scrollLeft+=240;if(e.key==='ArrowLeft')scroller.scrollLeft-=240;});

lang="en"; /* always start in English; RU only when the toggle is switched, and not remembered across reloads */
setLang(lang);
try{const vv=localStorage.getItem('gw_view'); if(vv==='spine'||vv==='full')view=vv;}catch(e){}
setView(view);

/* ===== Task board (Glidewell-logo button → half-screen kanban) ===== */
(function(){
  const COLS=[
    {key:'ideas',    nm:{en:'Ideas',ru:'Идеи'}},
    {key:'progress', nm:{en:'In progress',ru:'В работе'}},
    {key:'done',     nm:{en:'Done',ru:'Готово'}},
    {key:'archive',  nm:{en:'Archive',ru:'Архив'}}
  ];
  const tp=document.getElementById('taskpanel'), tpBody=document.getElementById('tp-body');
  const tasks=()=> (window.GW_TASKS||[]);
  function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
  const tpFoot=document.getElementById('tp-foot');
  function tfbLoad(){ try{return JSON.parse(localStorage.getItem('gw_taskfb')||'{}');}catch(e){return {};} }
  function tfbSave(d){ try{localStorage.setItem('gw_taskfb',JSON.stringify(d));}catch(e){} }
  function tfbCount(){ var f=(tfbLoad().fb)||{}, n=0; Object.keys(f).forEach(function(k){ if(f[k]&&f[k].trim())n++; }); return n; }
  function renderBoard(){
    const fb=(tfbLoad().fb)||{};
    let h='<div class="kb">';
    COLS.forEach(c=>{
      const items=tasks().filter(t=>t.col===c.key);
      h+='<div class="kb-col"><div class="kb-colh"><span>'+L(c.nm)+'</span><span>'+items.length+'</span></div>';
      h+=items.map(t=>'<div class="kb-card c-'+c.key+'" data-card="'+esc(t.id)+'"><div class="kc-id">'+esc(t.id)+(t.date?' · '+esc(t.date):'')+(fb[t.id]&&fb[t.id].trim()?'<span class="kc-fb" title="has feedback">💬</span>':'')+'</div><div class="kc-t">'+esc(L(t.title))+'</div></div>').join('');
      h+='</div>';
    });
    h+='</div>';
    tpBody.innerHTML=h;
  }
  function fmtNotes(s){
    return String(s).split(/\n+/).map(function(raw){
      var line=raw.trim(); if(!line) return '';
      var bullet=/^[•\-–]\s?/.test(line);
      if(bullet) line=line.replace(/^[•\-–]\s?/,'');
      var html=esc(line).replace(/^([A-ZА-Я][A-ZА-Я0-9 ()\/.,—-]{1,42}:)/, '<b>$1</b>');
      return bullet ? '<div class="kn-li">'+html+'</div>' : '<p>'+html+'</p>';
    }).join('');
  }
  function renderCard(id){
    const t=tasks().find(x=>x.id===id); if(!t){renderBoard();return;}
    const col=COLS.find(c=>c.key===t.col);
    let h='<div class="kb-detail"><button class="kd-back" id="kd-back"><span class="kd-back-arw">‹</span> '+L({en:'back to all tasks',ru:'назад ко всем задачам'})+'</button>';
    h+='<div class="kd-meta">'+esc(t.id)+' · '+L(col?col.nm:{en:t.col,ru:t.col})+(t.date?' · '+esc(t.date):'')+'</div>';
    h+='<h3>'+esc(L(t.title))+'</h3>';
    h+='<div class="kd-notes">'+(t.notes?fmtNotes(L(t.notes)):'—')+'</div>';
    if(t.links&&t.links.length){ h+='<div class="kd-sec">'+L({en:'Links',ru:'Связи'})+'</div>'+t.links.map(l=>'<div class="kd-link">• '+esc(L(l))+'</div>').join(''); }
    if(t.media&&t.media.length){ h+='<div class="kd-sec">'+L({en:'Media',ru:'Медиа'})+'</div><div class="kd-media">'+t.media.map(m=>'<img src="'+esc(m)+'" alt="">').join('')+'</div>'; }
    h+='<div class="kd-sec">'+L({en:'Your feedback',ru:'Ваш комментарий'})+'</div>';
    h+='<textarea class="kd-fb" data-tk-id="'+esc(t.id)+'" placeholder="'+esc(L({en:'Notes, ideas, concerns on this task…',ru:'Заметки, идеи, вопросы по задаче…'}))+'">'+esc(((tfbLoad().fb)||{})[t.id]||'')+'</textarea>';
    h+='</div>';
    tpBody.innerHTML=h;
  }
  function sendLabel(){ var n=tfbCount(); return L({en:'Send all feedback',ru:'Отправить всё'})+(n?' ('+n+')':''); }
  function renderFoot(){
    if(!tpFoot) return;
    var d=tfbLoad();
    tpFoot.hidden=false;
    tpFoot.innerHTML='<input class="tk-name" id="tk-name" placeholder="'+esc(L({en:'Your name',ru:'Ваше имя'}))+'" value="'+esc(d.name||'')+'">'
      +'<button type="button" class="tk-send" id="tk-send"'+(tfbCount()?'':' disabled')+'>'+esc(sendLabel())+'</button>'
      +'<span class="tk-status" id="tk-status"></span>';
  }
  function updateFootCount(){ var b=document.getElementById('tk-send'); if(b){ b.disabled=!tfbCount(); b.textContent=sendLabel(); } }
  function tfbSubmit(){
    var d=tfbLoad(), f=d.fb||{}, st=document.getElementById('tk-status');
    var items=Object.keys(f).filter(function(id){return f[id]&&f[id].trim();})
      .map(function(id){var t=tasks().find(x=>x.id===id); return {id:id, title:t?L(t.title):id, comment:f[id].trim()};});
    if(!d.name||!d.name.trim()){ if(st)st.textContent=L({en:'Enter your name first.',ru:'Сначала впишите имя.'}); return; }
    if(!items.length){ if(st)st.textContent=L({en:'Add a comment to at least one task.',ru:'Добавьте коммент хотя бы к одной задаче.'}); return; }
    if(!SURVEY_ENDPOINT){ if(st)st.textContent=L({en:'Receiver not connected yet.',ru:'Приёмник ещё не подключён.'}); return; }
    if(st)st.textContent=L({en:'Sending…',ru:'Отправляю…'});
    fetch(SURVEY_ENDPOINT,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({type:'taskfeedback', respondent:d.name.trim(), items:items})})
      .then(function(){ if(st)st.textContent=L({en:'Thanks — sent ✓',ru:'Спасибо — отправлено ✓'}); })
      .catch(function(){ if(st)st.textContent=L({en:'Send error — try again.',ru:'Ошибка отправки — ещё раз.'}); });
  }
  function setTitle(){ const el=tp.querySelector('.tp-ttl'); if(el)el.innerHTML='📋 '+esc(L({en:'Film tasks',ru:'Задачи фильма'}))+' <span class="tp-sub">· task board</span>'; }
  function openTasks(){ setTitle(); if(!window.GW_TASKS){tpBody.innerHTML='<p style="color:var(--mute)">Glidewell_Tasks.js not loaded.</p>';}else renderBoard(); renderFoot(); tp.classList.add('open'); tp.setAttribute('aria-hidden','false'); }
  function closeTasks(){ tp.classList.remove('open'); tp.classList.remove('full'); var _tf=document.getElementById('tp-full'); if(_tf)_tf.textContent='⤢'; tp.setAttribute('aria-hidden','true'); }
  const gw=document.getElementById('gwmark'); if(gw)gw.addEventListener('click',openTasks);
  document.getElementById('tp-close').addEventListener('click',closeTasks);
  document.getElementById('tp-full').addEventListener('click',function(){var f=tp.classList.toggle('full');this.textContent=f?'⤡':'⤢';this.setAttribute('aria-label',f?'Collapse':'Expand');this.setAttribute('title',f?'Свернуть':'Развернуть на весь экран');});
  tpBody.addEventListener('click',e=>{
    const card=e.target.closest('[data-card]'); if(card){renderCard(card.dataset.card);return;}
    if(e.target.closest('#kd-back')){renderBoard();return;}
  });
  tpBody.addEventListener('input',e=>{
    const fb=e.target.closest('.kd-fb'); if(fb){ const d=tfbLoad(); d.fb=d.fb||{}; d.fb[fb.dataset.tkId]=fb.value; tfbSave(d); updateFootCount(); }
  });
  if(tpFoot){
    tpFoot.addEventListener('input',e=>{ const n=e.target.closest('.tk-name'); if(n){ const d=tfbLoad(); d.name=n.value; tfbSave(d); } });
    tpFoot.addEventListener('click',e=>{ if(e.target.closest('.tk-send'))tfbSubmit(); });
  }
  document.addEventListener('keydown',e=>{ if(e.key==='Escape'&&tp.classList.contains('open'))closeTasks(); });
  // re-render board in the new language if it's open when the toggle is switched
  ['lang-en','lang-ru'].forEach(id=>{ const b=document.getElementById(id); if(b)b.addEventListener('click',()=>{ if(tp.classList.contains('open')){ setTitle(); renderBoard(); renderFoot(); } }); });
})();
</script>
</body>
</html>
